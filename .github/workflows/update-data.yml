name: Daily JSON Update

on:
  schedule:
    - cron: '0 1 * * *'   # 1 AM UTC daily
  workflow_dispatch:    # manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # pip install -r requirements.txt   # if you have one

      - name: Run full‑pipeline script
        run: python run_full_pipeline.py

      - name: Commit & push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/todays_predictions.json data/yesterday_results.json
          git diff --cached --quiet || git commit -m "chore: daily JSON update"
          git push
